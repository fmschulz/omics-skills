site_name: omics-skills
site_description: Agent prompts and reusable skills for omics analysis, literature discovery, scientific writing, and data visualization.
site_url: https://fmschulz.github.io/omics-skills/
repo_url: https://github.com/fmschulz/omics-skills
repo_name: fmschulz/omics-skills
edit_uri: edit/main/docs/

theme:
  name: material
  locale: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Agents: agents.md
  - Skills: skills.md
  - Routing: routing.md
  - Development: development.md
  - GitHub Pages: github-pages.md
  - Reference:
      - Skill Graph: SKILL_GRAPH.md
      - Routing Improvements: ROUTING_IMPROVEMENTS.md
      - Tooling Survey 2026: tooling-survey-2026.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fmschulz/omics-skills

strict: true
