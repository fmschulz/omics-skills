# Routing benchmark: representative tasks → expected router output.
#
# Runner: python3 scripts/routing_benchmark.py [--json]
#
# Fields:
#   task                       — natural-language task description
#   platform                   — claude | codex | generic
#   expected_agent             — required agent name or null (no constraint)
#   expected_primary_skills    — skills that MUST appear in result.primary_skills
#   expected_primary_exact     — exact result.primary_skills list, for tight checks
#   expected_ordered_includes  — skills that MUST appear anywhere in result.ordered_skills
#                                (use this for dependencies the router should surface)
#   forbidden_skills           — skills that MUST NOT appear in any result list
#                                (use for mutual-exclusion cases, e.g. an arxiv query
#                                must not surface biorxiv-search as primary)
#   max_supporting_skills      — upper bound on len(result.supporting_skills); guards
#                                against the dependency/compose tail snowballing
#   max_primary_skills         — upper bound on len(result.primary_skills); guards
#                                against broad pattern matches surfacing noisy primaries
#   expect_no_primary          — true when an off-domain query must yield NO confident
#                                primary skill (hard-negative precision check)

