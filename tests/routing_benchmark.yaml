# Routing benchmark: representative tasks → expected router output.
#
# Runner: python3 scripts/routing_benchmark.py [--json]
#
# Fields:
#   task                       — natural-language task description
#   platform                   — claude | codex | generic
#   expected_agent             — required agent name or null (no constraint)
#   expected_primary_skills    — skills that MUST appear in result.primary_skills
#   expected_ordered_includes  — skills that MUST appear anywhere in result.ordered_skills
#                                (use this for dependencies the router should surface)
#   forbidden_skills           — skills that MUST NOT appear in any result list
#                                (use for mutual-exclusion cases, e.g. an arxiv query
#                                must not surface biorxiv-search as primary)

# ============================================================================
# Omics pipeline (omics-scientist)
# ============================================================================

- task: "quality-control Illumina short reads with fastp and trim adapters"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-reads-qc-mapping]

- task: "assemble a metagenome from short reads and recover MAGs"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-assembly-qc]
  expected_ordered_includes: [bio-reads-qc-mapping, bio-assembly-qc, bio-binning-qc]

- task: "predict genes in a newly assembled bacterial genome"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-gene-calling]

- task: "functional annotation with eggnog-mapper on predicted proteins"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-annotation]

- task: "build a phylogenetic tree from marker gene alignments"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-phylogenomics]

- task: "detect viral contigs in a metagenomic assembly and classify them"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-viromics]

- task: "cluster proteins into orthogroups and derive a pangenome matrix"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-protein-clustering-pangenome]

- task: "predict protein structure with AlphaFold and run structure-based annotation"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-structure-annotation]

- task: "query JGI IMG for all cyanobacterial genomes and download FASTA files"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [jgi-lakehouse]

- task: "reconcile NCBI and GTDB taxonomy for a list of MAGs"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [tracking-taxonomy-updates]

- task: "scaffold a new bioinformatics project with reproducible environments"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-foundation-housekeeping]

- task: "design a Nextflow pipeline for metagenomic assembly on HPC"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-prefect-dask-nextflow]

- task: "formulate a hypothesis for why certain strains outperform others and plan the experimental design"
  platform: codex
  expected_agent: omics-scientist
  expected_primary_skills: [bio-logic]

