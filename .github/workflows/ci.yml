name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "site/**"
      - "tasks/**"
      - ".memd/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Validate shell scripts
        run: bash -n scripts/install.sh scripts/uninstall.sh scripts/test-install.sh

      - name: Validate skills
        run: python3 scripts/validate-skills.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Run routing benchmark
        run: make benchmark

      - name: Build documentation
        run: uvx --from mkdocs --with 'mkdocs-material==9.5.*' --with pymdown-extensions mkdocs build --strict --site-dir site

