name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve tag and notes
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          notes=".github/releases/${tag}.md"
          if [ ! -f "$notes" ]; then
            echo "Missing release notes: $notes" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --title "omics-skills ${{ steps.release.outputs.tag }}" \
            --notes-file "${{ steps.release.outputs.notes }}" \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

